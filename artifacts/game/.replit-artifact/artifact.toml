kind = "web"
previewPath = "/"
title = "95-Й Бакстаб"
version = "1.0.0"
id = "artifacts/game"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24631

[services.development]
run = "pnpm --filter @workspace/game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/game", "run", "build" ]
serve = "static"
publicDir = "artifacts/game/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24631"
BASE_PATH = "/"
